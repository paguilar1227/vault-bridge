name: Build and Deploy

on:
  workflow_dispatch:  # Manual only — gateway handles deploys now

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: pabloregistry.azurecr.io
  IMAGE_NAME: vault-bridge
  RESOURCE_GROUP: vault-bridge-rg
  CONTAINER_APP_NAME: vault-bridge

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name pabloregistry

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $REGISTRY/$IMAGE_NAME:${{ github.sha }}
